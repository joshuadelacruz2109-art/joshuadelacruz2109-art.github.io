<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cofession ni DC</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: url('https://img.freepik.com/vector-gratis/tema-san-valentin-corazones-cielo-rosa_1308-38030.jpg?semt=ais_hybrid&w=740') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      font-family: 'Arial', sans-serif;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .message {
      background: rgba(255, 255, 255, 0.8);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
      font-size: 28px;
      color: #d63384;
      font-weight: bold;
      margin-bottom: 25px;
      transition: transform 0.3s ease;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .message:hover {
      transform: scale(1.1);
    }

    /* Bubbles Container - FIXED Z-INDEX */
    #bubbles-text {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 100; /* Now it floats ABOVE everything */
    }

    .text-bubble {
      position: absolute;
      font-size: 18px;
      font-family: 'Cursive', sans-serif;
      color: #d63384;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 10px 20px;
      border-radius: 25px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      animation: floatText 8s ease-in-out forwards;
      white-space: nowrap;
    }

    @keyframes floatText {
      0% { opacity: 0; transform: scale(0.5) translateY(0px); }
      15% { opacity: 1; transform: scale(1.2) translateY(-20px); }
      85% { opacity: 1; transform: scale(1) translateY(-100px); }
      100% { opacity: 0; transform: scale(1) translateY(-120px); }
    }

    h1 {
      color: #d63384;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .display {
      width: 150px;
      height: 150px;
      color: #ff3366;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* Envelope styling */
    .envelope {
      width: 300px;
      height: 200px;
      background: #c9a66b;
      position: relative;
      margin: 30px auto;
      overflow: hidden;
      transition: all 0.5s ease;
      border-radius: 10px;
      box-shadow: 0px 8px 15px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: #b58b4c;
      transform-origin: top center;
      transition: transform 1s ease;
      border-bottom: 2px solid #a37a3d;
      z-index: 11;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .flap::after {
      content: "❤";
      font-size: 40px;
      color: #ff3366;
      animation: heartbeat 1.5s infinite;
    }

    .envelope.open .flap {
      transform: rotateX(150deg);
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); }
      50% { transform: scale(1); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .letter {
      background: #fff;
      width: 90%;
      height: 90%;
      margin: 10px auto;
      padding: 20px;
      transform: translateY(100%);
      transition: transform 0.8s ease;
      border-radius: 8px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .envelope.open .letter {
      transform: translateY(0);
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #ffffff;
      color: rgb(0, 0, 0);
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
      transition: background 0.3s ease;
      position: relative;
      z-index: 20; /* Ensures button is clickable */
    }

    button:hover {
      background: #ff34d6;
    }
  </style>
</head>
<body>
  <div class="message">FROM JOSHUA:</div>
  <h1>Happy Birthday</h1>
  <div class="display">
    <svg viewBox="0 0 100 92">
      <path d="M8.57864 8.57864C20.0168 -2.85955 38.5618 -2.85955 50 8.57864C61.4382 -2.85955 79.9832 -2.85955 91.4214 8.57864C102.86 20.0168 102.86 38.5618 91.4214 50C91.4162 50.0052 91.411 50.0104 91.4058 50.0156L50 91.4213L8.59924 50.0206C8.59237 50.0137 8.58551 50.0069 8.57864 50C-2.85955 38.5618 -2.85955 20.0168 8.57864 8.57864Z" fill="currentcolor"/>
    </svg>
  </div>

  <!-- Envelope -->
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <h2>OOPS PABITIN MUNA...</h2>
      <p>Tapusin mo yung music behh</p>
      <button onclick="window.location.href='confession.html';">
        Eto na talaga
      </button>
    </div>
  </div>

  <!-- Background music -->
  <audio id="bgMusic" src="tinamaan.mp3" loop></audio>

  <!-- Button to open envelope -->
  <button id="openBtn">Open Envelope</button>

  <!-- Bubble Text Container -->
  <div id="bubbles-text"></div>

  <script>
    // 1. BUBBLE TEXT LOGIC
    const messages = [
      "Hirap na itago ng feelings ko eh",
      "What if sabihin ko na gusto kita",
      "Na hulog ako beh",
      "I hope you like it",
      "Super effort yan beh ahh",
      "Sorry kung late na",
      "I've been hiding my feelings for months",
      "This is the right timing",
      "Happy Birthday",
      "Ngayon lang nagka courage"
    ];

    function createTextBubble() {
      const bubble = document.createElement("div");
      bubble.className = "text-bubble";
      bubble.innerText = messages[Math.floor(Math.random() * messages.length)];

      // Random position
      const left = Math.random() * 80 + 10;
      const top = Math.random() * 60 + 20; // Adjusted so it doesn't cover title too much
      bubble.style.left = left + "vw";
      bubble.style.top = top + "vh";

      const container = document.getElementById("bubbles-text");
      container.appendChild(bubble);

      // Remove bubble after animation
      setTimeout(() => {
        bubble.remove();
      }, 8000);
    }

    // Create a new bubble every 1.5 seconds
    setInterval(createTextBubble, 1500);

    // 2. ENVELOPE & MUSIC LOGIC
    const btn = document.getElementById("openBtn");
    const envelope = document.getElementById("envelope");
    const music = document.getElementById("bgMusic");

    btn.addEventListener("click", () => {
      // Toggle envelope
      envelope.classList.toggle("open");
      
      // Play music (browsers require user interaction first, which the click provides)
      music.play().catch(error => {
        console.log("Music autoplay blocked until first interaction");
      });
    });
  </script>
</body>
</html>
